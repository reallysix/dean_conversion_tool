name: DeanConversionTool
options:
  bundleIdPrefix: com.dean
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: DeanConversionTool/Bridging-Header.h

targets:
  DeanConversionTool:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DeanConversionTool
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PythonHelpers
        buildPhase: resources
    postBuildScripts:
      - name: Copy Python helpers
        inputFiles:
          - "$(SRCROOT)/PythonHelpers/speaker_diarization.py"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/speaker_diarization.py"
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$SRCROOT/PythonHelpers/speaker_diarization.py" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/"
      - name: Copy dependency installer
        inputFiles:
          - "$(SRCROOT)/Scripts/check_dependencies.sh"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/check_dependencies.sh"
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$SRCROOT/Scripts/check_dependencies.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/check_dependencies.sh"
          chmod +x "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/check_dependencies.sh"
    settings:
      base:
        PRODUCT_NAME: Dean Conversion Tool
        PRODUCT_MODULE_NAME: DeanConversionTool
        PRODUCT_BUNDLE_IDENTIFIER: com.dean.conversiontool
        INFOPLIST_FILE: DeanConversionTool/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        SWIFT_OBJC_BRIDGING_HEADER: DeanConversionTool/Bridging-Header.h
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
    info:
      path: DeanConversionTool/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleDisplayName: "语音转文字工具"
        CFBundleDocumentTypes:
          - CFBundleTypeName: 音频文件
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.audio
              - com.microsoft.waveform-audio
              - public.mp3
              - com.apple.m4a-audio
              - org.xiph.ogg-vorbis
              - public.flac-audio
          - CFBundleTypeName: 视频文件
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - com.apple.quicktime-movie
              - public.mpeg-4
              - org.matroska.mkv
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: 语音转文字工具
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "Copyright © 2026 Dean. 保留所有权利。"
        NSMicrophoneUsageDescription: "语音转文字工具需要麦克风权限以进行音频转录。"
        NSScreenCaptureUsageDescription: "语音转文字工具需要屏幕录制权限以进行视频转录。"

  DeanConversionToolTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DeanConversionToolTests
    dependencies:
      - target: DeanConversionTool
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dean.conversiontool.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Dean Conversion Tool.app/Contents/MacOS/Dean Conversion Tool"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

schemes:
  DeanConversionTool:
    build:
      targets:
        DeanConversionTool: all
        DeanConversionToolTests: [test]
    test:
      targets:
        - DeanConversionToolTests
